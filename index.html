<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yoga</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    #queue-container {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
      align-items: start;
    }
    .video-card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      background: #fff;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .video-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(0,0,0,0.08);
    }
    .video-card img {
      width: 100%;
      height: auto;
      border-radius: 6px;
      display: block;
    }
    .video-card h3 {
      font-size: 0.9rem;
      margin: 10px 0 0;
      line-height: 1.3;
      min-height: 3.9em;
      overflow: hidden;
    }
    p { margin: 0; }
  </style>
</head>
<body>
  <div id="queue-controls"></div>
  <!-- Yoga collection items will be inserted here by queue.js -->
  <script src="queue.js?v=1"></script>
</body>
</html>
